<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates - [Your Name]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="matrix-bg.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: auto;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }
        .matrix-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }
        .back-home {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
        }
        .back-home:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .back-home-bottom {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            margin: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="matrix-container" data-opacity="low">
        <canvas id="matrix"></canvas>
    </div>
    <div class="container">
        <a href="index.html" class="back-home back-home-bottom">Back to Home</a>
        <h1>Certificates</h1>
        <p>Add your certificates content here.</p>
    </div>
    <script src="matrix-bg.js"></script>
</body>
</html>
